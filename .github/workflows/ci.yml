name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov pylint

      - name: Run tests
        run: pytest tests/ -v --cov=src

      - name: Run linting
        run: pylint src/ --fail-under=7.0 || true

      - name: Verify test count
        run: |
          test_count=$(pytest tests/ --collect-only -q | grep -c "test_" || true)
          echo "Total tests found: $test_count"
          if [ "$test_count" -lt 4 ]; then
            echo "Error: Less than 4 tests found!"
            exit 1
          fi